[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "STRAVA_CLIENT_SECRET,VITE_STRAVA_CLIENT_ID,VITE_STRAVA_REDIRECT_URI"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/strava-token"
  to = "/.netlify/functions/strava-token"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
